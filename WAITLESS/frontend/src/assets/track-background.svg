<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="trackPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d7a7a;stop-opacity:0.14" />
      <stop offset="100%" style="stop-color:#0a5f5f;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="trackAccent" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ea8;stop-opacity:0.11" />
      <stop offset="100%" style="stop-color:#3d8a94;stop-opacity:0.04" />
    </linearGradient>
    <pattern id="trackGrid" width="65" height="65" patternUnits="userSpaceOnUse">
      <circle cx="32.5" cy="32.5" r="1.5" fill="#0d7a7a" opacity="0.07"/>
    </pattern>
  </defs>
  
  <rect width="1920" height="1080" fill="#f8f9fa"/>
  
  <ellipse cx="0" cy="180" rx="850" ry="620" fill="url(#trackPrimary)"/>
  <ellipse cx="1920" cy="120" rx="800" ry="580" fill="url(#trackAccent)"/>
  
  <rect width="1920" height="1080" fill="url(#trackGrid)" opacity="0.5"/>
  
  <g opacity="0.04" stroke="#0d7a7a" stroke-width="1" fill="none">
    <circle cx="300" cy="400" r="100"/>
    <circle cx="1620" cy="450" r="90"/>
    <circle cx="960" cy="650" r="150"/>
  </g>
  
  <g opacity="0.03" fill="#0d7a7a">
    <rect x="150" y="750" width="45" height="45" rx="6"/>
    <rect x="1725" y="800" width="40" height="40" rx="5"/>
    <rect x="600" y="880" width="35" height="35" rx="4"/>
  </g>
  
  <linearGradient id="trackFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
  </linearGradient>
  <rect x="0" y="700" width="1920" height="380" fill="url(#trackFade)"/>
</svg>

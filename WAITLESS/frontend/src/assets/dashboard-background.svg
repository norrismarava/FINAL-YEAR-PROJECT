<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dashPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d7a7a;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0a5f5f;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="dashAccent" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ea8;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#3d8a94;stop-opacity:0.03" />
    </linearGradient>
    <pattern id="dashGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none" stroke="#0d7a7a" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  
  <rect width="1920" height="1080" fill="#f8f9fa"/>
  
  <ellipse cx="200" cy="0" rx="700" ry="500" fill="url(#dashPrimary)"/>
  <ellipse cx="1720" cy="100" rx="650" ry="450" fill="url(#dashAccent)"/>
  
  <rect width="1920" height="1080" fill="url(#dashGrid)" opacity="0.6"/>
  
  <g opacity="0.03" stroke="#0d7a7a" stroke-width="1" fill="none">
    <circle cx="200" cy="300" r="120"/>
    <circle cx="1720" cy="350" r="100"/>
    <circle cx="960" cy="540" r="200"/>
  </g>
  
  <g opacity="0.02" fill="#0d7a7a">
    <rect x="100" y="700" width="40" height="40" rx="4"/>
    <rect x="1780" y="750" width="35" height="35" rx="4"/>
    <rect x="500" y="850" width="30" height="30" rx="4"/>
  </g>
  
  <linearGradient id="dashFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
  </linearGradient>
  <rect x="0" y="700" width="1920" height="380" fill="url(#dashFade)"/>
</svg>
